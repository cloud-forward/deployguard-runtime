rules:
  - id: self_suppress_deployguard
    description: "DeployGuard runtime scanner 자기 자신의 이벤트 억제"
    enabled: true
    reason: "self_collector_noise: deployguard internal collector"
    match:
      workload_labels:
        deployguard.io/internal-collector: "true"
      fact_type: "sa_token_access|kube_api_access"
      binary: "/usr/local/bin/kubectl"
    action:
      drop: true
      log_level: info
      emit_metric: true

  - id: self_suppress_tetragon_agent
    description: "Tetragon 에이전트 자체 이벤트 억제"
    enabled: true
    reason: "self_collector_noise: tetragon agent"
    match:
      workload_labels:
        app.kubernetes.io/name: "tetragon"
      fact_type: "sa_token_access|imds_access|host_sensitive_path_access"
    action:
      drop: true
      log_level: debug
      emit_metric: true

  - id: self_suppress_cilium_agent
    description: "Cilium agent 네트워크 이벤트 억제"
    enabled: true
    reason: "self_collector_noise: cilium agent"
    match:
      workload_labels:
        k8s-app: "cilium"
      category: "network"
    action:
      drop: true
      log_level: debug
      emit_metric: true