apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "deployguard.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "deployguard.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "deployguard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "deployguard.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "deployguard.serviceAccountName" . }}
      {{- end }}

      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}

      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}

      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}

      containers:
      - name: scanner
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        # 공통
        - name: SCAN_INTERVAL
          value: "{{ .Values.scanner.interval }}"
        - name: OUTPUT_DIR
          value: "{{ .Values.scanner.outputDir }}"
        - name: DEBUG
          value: "{{ .Values.scanner.debug }}"
        - name: SAVE_RAW
          value: "{{ .Values.scanner.saveRaw }}"
        # Tetragon
        - name: TETRAGON_ENABLED
          value: "{{ .Values.dataSources.tetragon.enabled }}"
        - name: TETRAGON_NAMESPACE
          value: "{{ .Values.dataSources.tetragon.namespace }}"
        - name: TETRAGON_SELECTOR
          value: "{{ .Values.dataSources.tetragon.podLabelSelector }}"
        - name: TETRAGON_CONTAINER
          value: "{{ .Values.dataSources.tetragon.containerName }}"
        # Audit
        - name: AUDIT_ENABLED
          value: "{{ .Values.dataSources.audit.enabled }}"
        - name: AUDIT_LOG_PATH
          value: "{{ .Values.dataSources.audit.logPath }}"
        - name: AUDIT_TAIL_LINES
          value: "{{ .Values.dataSources.audit.tailLines }}"

        volumeMounts:
        - name: config
          mountPath: /app/config/rules.yaml
          subPath: rules.yaml
          readOnly: true
        - name: output
          mountPath: {{ .Values.scanner.outputDir }}
        {{- if .Values.dataSources.audit.enabled }}
        - name: audit-log
          mountPath: /var/log/kubernetes/audit
          readOnly: true
        {{- end }}

        resources:
          {{- toYaml .Values.resources | nindent 10 }}

      volumes:
      - name: config
        configMap:
          name: {{ include "deployguard.fullname" . }}-config
      - name: output
        emptyDir: {}
      {{- if .Values.dataSources.audit.enabled }}
      - name: audit-log
        hostPath:
          path: /var/log/kubernetes/audit
          type: DirectoryOrCreate
      {{- end }}
