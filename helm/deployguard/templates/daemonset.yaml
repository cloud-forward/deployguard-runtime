apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "deployguard.fullname" . }}
  labels:
    {{- include "deployguard.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "deployguard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "deployguard.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "deployguard.serviceAccountName" . }}
      {{- end }}
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
      - name: scanner
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: SCAN_INTERVAL
          value: "{{ .Values.scanner.interval }}"
        - name: OUTPUT_DIR
          value: "{{ .Values.scanner.outputDir }}"
        - name: TETRAGON_ENABLED
          value: "{{ .Values.dataSources.tetragon.enabled }}"
        - name: TETRAGON_NAMESPACE
          value: "{{ .Values.dataSources.tetragon.namespace }}"
        - name: TETRAGON_POD_SELECTOR
          value: "{{ .Values.dataSources.tetragon.podLabelSelector }}"
        - name: AUDIT_ENABLED
          value: "{{ .Values.dataSources.audit.enabled }}"
        - name: AUDIT_LOG_PATH
          value: "{{ .Values.dataSources.audit.logPath }}"
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: output
          mountPath: {{ .Values.scanner.outputDir }}
        {{- if and .Values.dataSources.audit.enabled (not .Values.dataSources.audit.masterOnly) }}
        - name: audit-log
          mountPath: /var/log/kubernetes/audit
          readOnly: true
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      - name: config
        configMap:
          name: {{ include "deployguard.fullname" . }}-config
      - name: output
        emptyDir: {}
      {{- if and .Values.dataSources.audit.enabled (not .Values.dataSources.audit.masterOnly) }}
      - name: audit-log
        hostPath:
          path: {{ .Values.dataSources.audit.logPath | dir }}
          type: Directory
      {{- end }}

{{- define "deployguard.fullname" -}}
{{- default .Release.Name .Values.nameOverride | trunc 63 | trimSuffix "-" }}
{{- end }}

{{- define "deployguard.labels" -}}
helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
{{ include "deployguard.selectorLabels" . }}
app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
app.kubernetes.io/managed-by: {{ .Release.Service }}
{{- end }}

{{- define "deployguard.selectorLabels" -}}
app.kubernetes.io/name: {{ include "deployguard.name" . }}
app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}

{{- define "deployguard.name" -}}
{{- default .Chart.Name .Values.nameOverride | trunc 63 | trimSuffix "-" }}
{{- end }}

{{- define "deployguard.serviceAccountName" -}}
{{- if .Values.serviceAccount.name }}
{{- .Values.serviceAccount.name }}
{{- else }}
{{- include "deployguard.fullname" . }}
{{- end }}
{{- end }}