{{- if and .Values.dataSources.tetragon.enabled .Values.dataSources.tetragon.install }}
---
# Tetragon이 없는 클러스터에 자동 설치하는 pre-install Job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "deployguard.fullname" . }}-tetragon-installer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "deployguard.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "deployguard.fullname" . }}-tetragon-installer
  labels:
    {{- include "deployguard.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: {{ include "deployguard.fullname" . }}-tetragon-installer
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "deployguard.fullname" . }}-tetragon-install
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "deployguard.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 2
  template:
    spec:
      serviceAccountName: {{ include "deployguard.fullname" . }}-tetragon-installer
      restartPolicy: OnFailure
      containers:
      - name: installer
        image: alpine/helm:3.14.0
        command:
        - /bin/sh
        - -c
        - |
          set -e

          echo "[INFO] Tetragon 설치 여부 확인..."
          if helm status tetragon -n {{ .Values.dataSources.tetragon.namespace }} > /dev/null 2>&1; then
            echo "[INFO] Tetragon 이미 설치됨 — 스킵"
            exit 0
          fi

          echo "[INFO] Tetragon Helm repo 추가..."
          helm repo add cilium https://helm.cilium.io
          helm repo update

          echo "[INFO] Tetragon 설치 중..."
          helm install tetragon cilium/tetragon \
            -n {{ .Values.dataSources.tetragon.namespace }} \
            --create-namespace \
            --set tetragon.exportAllowList="" \
            --wait \
            --timeout 5m

          echo "[INFO] Tetragon 설치 완료"
{{- end }}
