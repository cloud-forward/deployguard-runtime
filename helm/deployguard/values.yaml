# ── 이미지 ────────────────────────────────────────────────────────────
image:
  repository: doosanbears/deployguard-scanner
  tag: "latest"
  pullPolicy: IfNotPresent

# ── 스캐너 공통 설정 ──────────────────────────────────────────────────
scanner:
  interval: 300          # 스캔 주기 (초)
  outputDir: "/tmp/evidence"
  debug: false
  saveRaw: false

# ── 데이터 소스 ───────────────────────────────────────────────────────
dataSources:

  tetragon:
    enabled: true
    # Tetragon이 설치되어 있지 않은 경우 install: true 로 함께 설치
    install: false
    namespace: "kube-system"
    podLabelSelector: "app.kubernetes.io/name=tetragon"
    containerName: "export-stdout"

  audit:
    enabled: true
    logPath: "/var/log/kubernetes/audit/audit.log"
    tailLines: 1000

# ── 리소스 ────────────────────────────────────────────────────────────
resources:
  limits:
    memory: "512Mi"
    cpu: "500m"
  requests:
    memory: "256Mi"
    cpu: "100m"

# ── ServiceAccount / RBAC ─────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""   # 비워두면 release 이름으로 자동 생성

# ── 노드 배포 제어 ────────────────────────────────────────────────────
# audit 로그는 control-plane 노드에만 있으므로 기본 toleration 포함
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule

nodeSelector: {}
  # 특정 노드만 배포하려면:
  # node-role.kubernetes.io/control-plane: ""

# ── 보안 컨텍스트 ─────────────────────────────────────────────────────
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

# ── rules.yaml 오버라이드 ─────────────────────────────────────────────
# true 로 설정하고 rules 아래에 직접 작성하면 ConfigMap 내용이 교체됨
config:
  override: false
  rules: {}
