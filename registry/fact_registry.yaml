# registry/fact_registry.yaml
#
# 이 파일은 fact_registry.py의 builtin registry를 override/extend 한다.
# 새 fact_type 추가 또는 기존 hint 조정 시 이 파일만 수정한다.
# scanner core 코드 수정 불필요.
#
# 스키마:
#   <fact_type>:
#     family: str                      # MITRE ATT&CK 기반 family
#     severity_hint: str               # low | medium | high | critical
#     confidence_hint: float           # 0.0 ~ 1.0
#     default_scenario_tags: [str]     # 연관 시나리오 태그
#     description: str

# ── 예시: 운영 환경에서 override ──────────────────────────────────────

# imds_access:
#   severity_hint: "critical"          # 기본값(high)보다 상향
#   confidence_hint: 0.95

# ── 예시: 신규 fact_type 추가 ─────────────────────────────────────────
