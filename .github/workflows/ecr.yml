name: Build and Push Runtime Images
on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
env:
  AWS_REGION: ap-northeast-2
  AWS_ACCOUNT_ID: "189060532132"
  ECR_REPOSITORY: deployguard-runtime-scanner
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: arn:aws:iam::189060532132:role/deployguard-runtime-ecr-push-policy
          aws-region: ap-northeast-2

      - name: Login to ECR (189 계정)
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare image tags
        id: prep
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          BUILD_TIME=$(TZ=Asia/Seoul date +'%Y%m%d-%H%M')
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

      - name: Build scanner image
        run: |
          docker build \
            -t ${{ steps.prep.outputs.image_uri }}:scanner-latest \
            -t ${{ steps.prep.outputs.image_uri }}:scanner-sha-${{ steps.prep.outputs.short_sha }} \
            -t ${{ steps.prep.outputs.image_uri }}:scanner-main-${{ steps.prep.outputs.build_time }} \
            -f Dockerfile .

      - name: Push scanner image
        run: |
          docker push ${{ steps.prep.outputs.image_uri }}:scanner-latest
          docker push ${{ steps.prep.outputs.image_uri }}:scanner-sha-${{ steps.prep.outputs.short_sha }}
          docker push ${{ steps.prep.outputs.image_uri }}:scanner-main-${{ steps.prep.outputs.build_time }}
