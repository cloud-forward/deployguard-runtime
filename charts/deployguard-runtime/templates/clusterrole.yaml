{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "deployguard-runtime.fullname" . }}
  labels:
    {{- include "deployguard-runtime.labels" . | nindent 4 }}
rules:
  # Read node info
  - apiGroups: [""]
    resources: ["nodes", "nodes/status", "nodes/proxy"]
    verbs: ["get", "list", "watch"]
  # Read pods for process correlation
  - apiGroups: [""]
    resources: ["pods", "pods/status"]
    verbs: ["get", "list", "watch"]
  # Read namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # Read events for audit
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "deployguard-runtime.fullname" . }}
  labels:
    {{- include "deployguard-runtime.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "deployguard-runtime.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "deployguard-runtime.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
