{{- if .Values.auditSetup.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "deployguard-runtime.fullname" . }}-audit-policy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "deployguard-runtime.labels" . | nindent 4 }}
data:
  audit-policy.yaml: |
    apiVersion: audit.k8s.io/v1
    kind: Policy
    rules:
      - level: Request
        resources:
        - group: ""
          resources: ["secrets"]
        verbs: ["get", "list"]
      - level: Request
        resources:
        - group: "batch"
          resources: ["cronjobs"]
        - group: "apps"
          resources: ["daemonsets"]
        - group: "rbac.authorization.k8s.io"
          resources: ["rolebindings", "clusterrolebindings"]
        verbs: ["create"]
      - level: Request
        resources:
        - group: ""
          resources: ["pods/exec"]
        verbs: ["create"]
      - level: None
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "deployguard-runtime.fullname" . }}-audit-setup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "deployguard-runtime.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      hostPID: true
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      restartPolicy: OnFailure
      volumes:
        - name: k8s-manifests
          hostPath:
            path: /etc/kubernetes/manifests
        - name: k8s-audit-config
          hostPath:
            path: /etc/kubernetes/audit
            type: DirectoryOrCreate
        - name: audit-policy-cm
          configMap:
            name: {{ include "deployguard-runtime.fullname" . }}-audit-policy
      containers:
        - name: audit-setup
          image: bitnami/kubectl:latest
          securityContext:
            privileged: true
          volumeMounts:
            - name: k8s-manifests
              mountPath: /etc/kubernetes/manifests
            - name: k8s-audit-config
              mountPath: /etc/kubernetes/audit
            - name: audit-policy-cm
              mountPath: /tmp/audit-policy
          command:
            - /bin/sh
            - -c
            - |
              set -e
              APISERVER=/etc/kubernetes/manifests/kube-apiserver.yaml

              echo "[1/4] audit-policy.yaml 복사"
              cp /tmp/audit-policy/audit-policy.yaml /etc/kubernetes/audit/audit-policy.yaml

              echo "[2/4] 이미 설정됐는지 확인"
              if grep -q "audit-policy-file" $APISERVER; then
                echo "이미 Audit 설정 있음. 스킵."
                exit 0
              fi

              echo "[3/4] kube-apiserver.yaml 백업"
              cp $APISERVER ${APISERVER}.bak

              echo "[4/4] kube-apiserver.yaml에 audit 설정 추가"
              sed -i '/- kube-apiserver/a\    - --audit-policy-file=/etc/kubernetes/audit/audit-policy.yaml\n    - --audit-log-path=/var/log/kubernetes/audit/audit.log\n    - --audit-log-maxage=7\n    - --audit-log-maxbackup=3\n    - --audit-log-maxsize=100' $APISERVER

              if ! grep -q "audit-log" $APISERVER; then
                sed -i '/volumeMounts:/a\    - mountPath: /var/log/kubernetes/audit\n      name: audit-log\n    - mountPath: /etc/kubernetes/audit\n      name: audit-config' $APISERVER
                sed -i '/volumes:/a\  - hostPath:\n      path: /var/log/kubernetes/audit\n      type: DirectoryOrCreate\n    name: audit-log\n  - hostPath:\n      path: /etc/kubernetes/audit\n      type: DirectoryOrCreate\n    name: audit-config' $APISERVER
              fi

              echo "완료! kube-apiserver 재시작 중..."
{{- end }}
