apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: deployguard-runtime-policy
spec:
  kprobes:
  # SA token 접근
  - call: "__x64_sys_openat"
    syscall: true
    args:
    - index: 1
      type: "string"
    selectors:
    - matchArgs:
      - index: 1
        operator: "Prefix"
        values:
        - "/var/run/secrets/kubernetes.io/serviceaccount"

  # 민감 파일 접근
  - call: "__x64_sys_openat"
    syscall: true
    args:
    - index: 1
      type: "string"
    selectors:
    - matchArgs:
      - index: 1
        operator: "Prefix"
        values:
        - "/proc/1"
        - "/etc/shadow"
        - "/etc/kubernetes"
        - "/var/lib/kubelet"

  # IMDS 접근 (모든 tcp_connect 수집 후 코드에서 필터링)
  - call: "tcp_connect"
    syscall: false
    args:
    - index: 0
      type: "sock"

  # 의심 프로세스
  - call: "__x64_sys_execve"
    syscall: true
    args:
    - index: 0
      type: "string"
    selectors:
    - matchArgs:
      - index: 0
        operator: "Postfix"
        values:
        - "/curl"
        - "/nmap"
        - "/nsenter"
        - "/bash"
        - "/sh"