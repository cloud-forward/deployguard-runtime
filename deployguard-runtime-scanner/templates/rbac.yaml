{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "deployguard-runtime-scanner.serviceAccountName" . }}
  namespace: {{ include "deployguard-runtime-scanner.namespace" . }}
  labels:
    {{- include "deployguard-runtime-scanner.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "deployguard-runtime-scanner.fullname" . }}
  labels:
    {{- include "deployguard-runtime-scanner.labels" . | nindent 4 }}
rules:
  # pod_meta_map 빌드 + Tetragon pod 로그 수집
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - namespaces
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "deployguard-runtime-scanner.fullname" . }}
  labels:
    {{- include "deployguard-runtime-scanner.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "deployguard-runtime-scanner.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "deployguard-runtime-scanner.serviceAccountName" . }}
    namespace: {{ include "deployguard-runtime-scanner.namespace" . }}
{{- end }}
