{{- if .Values.auditScanner.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "deployguard-runtime-scanner.fullname" . }}-audit
  namespace: {{ include "deployguard-runtime-scanner.namespace" . }}
  labels:
    {{- include "deployguard-runtime-scanner.labels" . | nindent 4 }}
    app.kubernetes.io/component: audit-scanner
spec:
  replicas: {{ .Values.auditScanner.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: deployguard-runtime-scanner
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: audit-scanner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deployguard-runtime-scanner
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: audit-scanner
        deployguard.io/internal-collector: "true"
    spec:
      serviceAccountName: {{ include "deployguard-runtime-scanner.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: audit-scanner
          image: {{ include "deployguard-runtime-scanner.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ENGINE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "deployguard-runtime-scanner.fullname" . }}-engine-token
                  key: ENGINE_API_TOKEN
          envFrom:
            - configMapRef:
                name: {{ include "deployguard-runtime-scanner.fullname" . }}-audit-config
          resources:
            {{- toYaml .Values.auditScanner.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: audit-log
              mountPath: {{ .Values.auditScanner.env.AUDIT_LOG_PATH | dir }}
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: audit-log
          hostPath:
            path: {{ .Values.auditScanner.auditLogHostPath }}
            type: DirectoryOrCreate
      {{- with .Values.auditScanner.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.auditScanner.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
